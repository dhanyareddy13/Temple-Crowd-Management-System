<!DOCTYPE html>
<html>

<head>
<title>Edit Temple</title>
</head>

<body>

<h2>Edit Temple</h2>

<form action="/update/{{ temple.id }}" method="POST">

<input type="text" name="name" value="{{ temple.name }}">

<input type="text" name="location" value="{{ temple.location }}">

<input type="number" name="crowd" value="{{ temple.crowd }}">

<button type="submit">Update</button>

</form>

</body>
</html>
