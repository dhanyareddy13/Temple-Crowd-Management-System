<!DOCTYPE html>
<html>
<head>

<title>Temple Crowd Management</title>

<style>

body{
margin:0;
height:100vh;
font-family:Arial;

background:url("/static/templeimage.jpg") no-repeat center center fixed;
background-size:cover;

display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:rgba(0,0,0,0.8);
padding:40px;
border-radius:10px;
text-align:center;
color:white;
}

input{
width:200px;
padding:10px;
margin:10px;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
background:#3498db;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Temple Crowd Management</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<br>

<input type="password" name="password" placeholder="Password" required>

<br>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
